name: Build EXE with PyInstaller

on:
  push:
    tags:
      - 'v*'  # Trigger only on version tags like v1.0.0
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build MediaFlow EXE
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Poetry + Dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-dev

      - name: 🧾 Create .env file (with placeholder)
        run: echo API_PASSWORD= > .env

      - name: 🧊 Install PyInstaller
        run: pip install pyinstaller

      - name: ⚙️ Build EXE via PyInstaller
        run: |
          pyinstaller mediaflow_proxy/main.py \
            --onefile \
            --name mediaflow \
            --hidden-import=mediaflow_proxy \
            --collect-all mediaflow_proxy

      - name: 📦 Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-exe
          path: dist/mediaflow.exe

      - name: 🚀 GitHub Release (only if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mediaflow.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
