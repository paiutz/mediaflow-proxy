name: Build EXE with PyInstaller

on:
  push:
    tags:
      - 'v*'  # Runs only when you push a tag like v2.1.6
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.2'

      - name: 📥 Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-dev

      - name: 🧊 Install PyInstaller
        run: pip install pyinstaller

      - name: ⚙️ Build EXE
        run: |
          pyinstaller mediaflow_proxy/main.py --onefile --name mediaflow --hidden-import=mediaflow_proxy --collect-all mediaflow_proxy

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-exe
          path: dist/mediaflow.exe

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/mediaflow.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
