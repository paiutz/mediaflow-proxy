name: BuildEXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD || 'changeme' }}
      PORT: ${{ secrets.PORT || '8888' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.2'

      - name: Cache Poetry packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v3
        with:
          path: ${{ env.USERPROFILE }}\.cache\pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --only main

      - name: Generate .env file
        run: |
          echo "API_PASSWORD=${API_PASSWORD}" > $GITHUB_WORKSPACE/.env
          echo "PORT=${PORT}" >> $GITHUB_WORKSPACE/.env
          echo "DEBUG=true" >> $GITHUB_WORKSPACE/.env  # Optional for debugging

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          # Change to repo root to ensure .env and certs are found
          Set-Location $Env:GITHUB_WORKSPACE

          $buildCmd = @(
            "pyinstaller",
            "launcher.py",
            "--onefile",
            "--name", "mediaflow",
            "--add-data", "mediaflow_proxy/static;mediaflow_proxy/static",
            "--add-data", ".env;."
          )

          # Add certs if they exist
          if (Test-Path "cert.pem" -and Test-Path "key.pem") {
            Write-Host "Including cert.pem and key.pem"
            $buildCmd += "--add-data"
            $buildCmd += "cert.pem;."
            $buildCmd += "--add-data"
            $buildCmd += "key.pem;."
          }
          if (Test-Path "fullchain.pem" -and Test-Path "privkey.pem") {
            Write-Host "Including fullchain.pem and privkey.pem"
            $buildCmd += "--add-data"
            $buildCmd += "fullchain.pem;."
            $buildCmd += "--add-data"
            $buildCmd += "privkey.pem;."
          }

          # Run PyInstaller
          Write-Host "Running PyInstaller with: $($buildCmd -join ' ')"
          & $buildCmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-exe
          path: dist/mediaflow.exe
