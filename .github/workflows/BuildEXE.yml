name: Build EXE

on:
  push:
    tags:
      - 'v*'        # trigger su tag come v1.0.0
  workflow_dispatch:  # trigger manuale

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD || 'changeme' }}
      PORT: ${{ secrets.PORT || '8888' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.2'

      - name: Cache Poetry packages (Windows)
        uses: actions/cache@v3
        with:
          path: ${{ env.USERPROFILE }}\.cache\pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --only main

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller launcher.py --onefile --name mediaflow `
            --add-data "mediaflow_proxy/static;mediaflow_proxy/static"

      - name: Generate .env accanto all'EXE
        run: |
          echo "API_PASSWORD=${API_PASSWORD}" > dist/.env
          echo "PORT=${PORT}" >> dist/.env
          echo "DEBUG=true" >> dist/.env

      - name: Create ZIP with EXE and .env
        run: |
          powershell Compress-Archive -Path dist/mediaflow.exe, dist/.env -DestinationPath dist/mediaflow_bundle.zip -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-bundle
          path: dist/mediaflow_bundle.zip
