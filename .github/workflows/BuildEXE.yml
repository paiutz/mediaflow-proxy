name: BuildEXE

on:
  push:
    tags:
      - 'v*'        # Run on version tags like v1.0.0
  workflow_dispatch: # Manual trigger in GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD || 'changeme' }}
      PORT: ${{ secrets.PORT || '8888' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.2'

      - name: Cache Poetry packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v3
        with:
          path: ${{ env.USERPROFILE }}\.cache\pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --only main

      - name: Generate .env file dynamically inside mediaflow-proxy folder
        run: |
          echo "API_PASSWORD=${API_PASSWORD}" > mediaflow-proxy/.env
          echo "PORT=${PORT}" >> mediaflow-proxy/.env
          echo "DEBUG=true" >> mediaflow-proxy/.env

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          Set-Location mediaflow-proxy
          pyinstaller launcher.py --onefile --name mediaflow `
            --add-data "mediaflow_proxy/static;mediaflow_proxy/static" `
            --add-data ".env;."

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-exe
          path: mediaflow-proxy/dist/mediaflow.exe
