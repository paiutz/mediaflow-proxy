name: BuildEXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD || 'changeme' }}
      PORT: ${{ secrets.PORT || '8888' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.2'

      - name: Cache Poetry packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-dev

      - name: Generate .env file
        run: |
          echo "API_PASSWORD=${API_PASSWORD}" > .env
          echo "PORT=${PORT}" >> .env

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          $buildCmd = "pyinstaller launcher.py --onefile --name mediaflow --add-data 'mediaflow_proxy/static;mediaflow_proxy/static' --add-data '.env;.'"
          if (Test-Path "cert.pem" -and Test-Path "key.pem") {
            Write-Host "Adding cert.pem and key.pem to build"
            $buildCmd += " --add-data 'cert.pem;.' --add-data 'key.pem;.'"
          } else {
            Write-Host "cert.pem or key.pem not found, building HTTP only"
          }
          Invoke-Expression $buildCmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-exe
          path: dist/mediaflow.exe
